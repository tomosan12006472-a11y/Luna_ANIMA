name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  python-checks:
    name: Python checks (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python files
        shell: python
        run: |
          from pathlib import Path
          import py_compile

          paths = [*Path("app").rglob("*.py"), *Path("tests").rglob("*.py")]
          for path in paths:
              py_compile.compile(str(path), doraise=True)
          print(f"compiled {len(paths)} files")

      - name: Run compileall
        run: python -m compileall app tests

      - name: Check whitespace
        run: git diff --check
