name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  python-checks:
    name: Python checks (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Node.js version
        run: node --version

      - name: Check frontend JavaScript syntax
        run: node scripts/check_frontend_js.mjs

      - name: Check static import tokens
        run: node scripts/check_static_import_tokens.mjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python files
        shell: python
        run: |
          from pathlib import Path
          import py_compile

          paths = [*Path("app").rglob("*.py"), *Path("tests").rglob("*.py")]
          for path in paths:
              py_compile.compile(str(path), doraise=True)
          print(f"compiled {len(paths)} files")

      - name: Run compileall
        run: python -m compileall app tests

      - name: Check whitespace in pull request diff
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Check whitespace in push diff
        if: github.event_name == 'push'
        run: |
          before="${{ github.event.before }}"
          if [ "$before" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$before^{commit}" 2>/dev/null; then
            git diff --check "$before..HEAD"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff --check --root HEAD
          fi
